<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="1024" viewBox="0 0 2048 1024">
  <defs>
    <linearGradient id="verticalStudioGradient" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8f8f8"/>
      <stop offset="35%" stop-color="#e2e2e2"/>
      <stop offset="70%" stop-color="#cfcfcf"/>
      <stop offset="100%" stop-color="#b8b8b8"/>
    </linearGradient>

    <linearGradient id="softPanel" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="darkPanel" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#444444" stop-opacity="0"/>
      <stop offset="45%" stop-color="#444444" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#444444" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#444444" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="2048" height="1024" fill="url(#verticalStudioGradient)"/>

  <!-- Large neutral reflection cards -->
  <rect x="90" y="0" width="180" height="1024" fill="url(#softPanel)"/>
  <rect x="420" y="0" width="90" height="1024" fill="#ffffff" opacity="0.55"/>
  <rect x="720" y="0" width="220" height="1024" fill="url(#softPanel)"/>
  <rect x="1120" y="0" width="120" height="1024" fill="#ffffff" opacity="0.65"/>
  <rect x="1520" y="0" width="240" height="1024" fill="url(#softPanel)"/>

  <!-- Subtle dark cards for contrast in glossy reflections -->
  <rect x="330" y="0" width="95" height="1024" fill="url(#darkPanel)"/>
  <rect x="980" y="0" width="120" height="1024" fill="url(#darkPanel)"/>
  <rect x="1800" y="0" width="90" height="1024" fill="#555555" opacity="0.25"/>

  <!-- Soft floor/horizon band -->
  <rect x="0" y="700" width="2048" height="324" fill="#bdbdbd" opacity="0.22"/>
  <rect x="0" y="690" width="2048" height="4" fill="#ffffff" opacity="0.35"/>
</svg>
